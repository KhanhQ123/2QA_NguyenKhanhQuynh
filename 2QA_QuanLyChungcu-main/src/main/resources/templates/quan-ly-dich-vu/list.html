<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Quản lý dịch vụ</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <div class="d-flex justify-content-between align-items-center mt-4 mb-4">
        <h2 style="font-weight:700; color:#1e293b; margin:0;">
            <i class="bi bi-gear-fill me-2" style="color:#0d6efd;"></i>Quản lý dịch vụ
        </h2>
        <a th:href="@{/quan-ly-dich-vu/add}" class="btn btn-primary" style="border-radius:10px; padding:10px 24px; font-weight:600;">
            <i class="bi bi-plus-lg me-1"></i>Thêm dịch vụ
        </a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert" style="border-radius:10px;">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert" style="border-radius:10px;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card" style="border:none; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.06);">
        <div class="card-body p-0">
            <table class="table table-hover mb-0" style="border-radius:12px; overflow:hidden;">
                <thead style="background:#f8fafc;">
                <tr>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem;">HÌNH ẢNH</th>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem;">TÊN DỊCH VỤ</th>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem;">NHÓM</th>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem;">NHÀ CUNG CẤP</th>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem;">ĐƠN VỊ</th>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem;">LOẠI PHÍ</th>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem;">ĐƠN GIÁ</th>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem;">MÔ TẢ</th>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem;">GIA (VND)</th>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem; text-align:center;">THAO TÁC</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="service : ${services}" style="vertical-align:middle;">
                    <td style="padding:12px 16px;">
                        <img th:if="${service.imageUrl != null}" th:src="@{${service.imageUrl}}"
                             style="width:60px; height:60px; object-fit:cover; border-radius:8px; border:1px solid #e5e7eb;" alt="img">
                        <div th:if="${service.imageUrl == null}" style="width:60px; height:60px; background:#f1f5f9; border-radius:8px; display:flex; align-items:center; justify-content:center;">
                            <i class="bi bi-image" style="color:#94a3b8; font-size:1.2rem;"></i>
                        </div>
                    </td>
                    <td style="padding:12px 16px; font-weight:600;" th:text="${service.name}"></td>
                    <td style="padding:12px 16px;" th:text="${service.category != null ? service.category.name : '-'}"></td>
                    <td style="padding:12px 16px;" th:text="${service.provider != null and !#strings.isEmpty(service.provider) ? service.provider : '-'}"></td>
                    <td style="padding:12px 16px;" th:text="${service.unit != null and !#strings.isEmpty(service.unit) ? service.unit : '-'}"></td>
                    <td style="padding:12px 16px;">
                        <span th:switch="${service.costType}">
                            <span th:case="'CO_DINH'">Cố định</span>
                            <span th:case="'THEO_SO_LUONG'">Theo số lượng</span>
                            <span th:case="'THEO_DIEN_TICH'">Theo diện tích</span>
                            <span th:case="*">-</span>
                        </span>
                    </td>
                    <td style="padding:12px 16px;"
                        th:text="${service.costValue != null ? (#numbers.formatDecimal(service.costValue, 0, 'COMMA', 0, 'POINT') + ' VND') : '-'}"></td>
                    <td style="padding:12px 16px; color:#64748b; font-size:0.9rem; max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" th:text="${service.description}"></td>
                    <td style="padding:12px 16px; font-weight:600; color:#059669;" th:text="${#numbers.formatDecimal(service.price, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                    <td style="padding:12px 16px; text-align:center;">
                        <div class="d-flex gap-2 justify-content-center">
                            <a th:href="@{/quan-ly-dich-vu/edit/{id}(id=${service.id})}"
                               class="btn btn-sm btn-outline-primary" style="border-radius:8px; padding:6px 12px;"
                               title="Sửa"><i class="bi bi-pencil-fill"></i></a>
                            <a th:href="@{/quan-ly-dich-vu/subscribers/{id}(id=${service.id})}"
                               class="btn btn-sm btn-outline-info" style="border-radius:8px; padding:6px 12px;"
                               title="Xem người đăng ký"><i class="bi bi-people-fill"></i></a>
                            <a th:href="@{/quan-ly-dich-vu/delete/{id}(id=${service.id})}"
                               class="btn btn-sm btn-outline-danger" style="border-radius:8px; padding:6px 12px;"
                               onclick="return confirm('Bạn có chắc chắn muốn xóa dịch vụ này?');"
                               title="Xóa"><i class="bi bi-trash-fill"></i></a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(services)}">
                    <td colspan="11" class="text-center py-5" style="color:#94a3b8;">
                        <i class="bi bi-inbox" style="font-size:2rem;"></i>
                        <p class="mt-2 mb-0">Chưa có dịch vụ nào</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
